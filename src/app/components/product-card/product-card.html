<article class="product-card">
  @if (produto.destaque) {
    <span class="product-badge">
      {{ produto.destaque }}
    </span>
  }

  <button type="button" class="product-image-box">
    <img
      [src]="produto.imagem"
      [alt]="produto.nome"
      class="product-image"
    />
  </button>

  <div class="product-content">
    <p class="product-category">
      {{ produto.categoria }}
    </p>

    <h3>{{ produto.nome }}</h3>

    <p class="product-description">
      {{ produto.descricao }}
    </p>

    @if (precoAntigo) {
      <p class="old-price">
        {{ formatarPreco(precoAntigo) }}
      </p>
    }

    <p class="new-price">
      {{ formatarPreco(produto.preco) }}
    </p>
  </div>

  <div class="product-actions">
    <button
      type="button"
      class="primary-btn full-width-btn"
      (click)="adicionarAoCarrinho()"
    >
      {{ buttonLabel }}
    </button>
  </div>
</article>
